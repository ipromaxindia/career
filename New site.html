<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPromax Careers | Official Recruitment</title>
    <style>
        :root {
            --brand-primary: #0062ff;
            --brand-secondary: #00d2ff;
            --brand-success: #00c853;
            --brand-dark: #0f172a;
            --whatsapp: #25d366;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            display: flex; justify-content: center; padding: 40px 20px; margin: 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            padding: 35px; border-radius: 32px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.3);
            width: 100%; max-width: 650px;
        }

        .logo-box { text-align: center; margin-bottom: 20px; }
        .logo-box img { max-width: 180px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1)); }

        h2 { text-align: center; font-size: 24px; background: linear-gradient(to right, #4f46e5, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; font-weight: 800; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }
        
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; color: #334155; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 14px; transition: 0.3s; }
        
        #role-desc-container {
            display: none; background: #f0f7ff; border-left: 4px solid var(--brand-primary);
            padding: 15px; border-radius: 8px; margin-bottom: 15px; cursor: pointer; transition: 0.3s;
        }
        .role-title { font-weight: 800; font-size: 13px; color: var(--brand-primary); margin-bottom: 5px; display: block; }
        .role-text { font-size: 12px; color: #475569; line-height: 1.5; }

        .skills-header { background: var(--brand-dark); color: white; padding: 10px 15px; border-radius: 12px 12px 0 0; font-size: 12px; font-weight: bold; }
        #skills-container { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            background: #fff; border: 2px solid var(--brand-dark); padding: 15px; border-radius: 0 0 12px 12px; margin-bottom: 15px;
        }

        .option-item { display: flex; align-items: center; gap: 10px; font-size: 13px; cursor: pointer; color: #475569; }
        .option-item input { width: 18px; height: 18px; accent-color: var(--brand-primary); cursor: pointer; margin: 0; }

        .highlight-box { grid-column: span 2; padding: 15px; border-radius: 12px; margin: 5px 0; display: flex; align-items: center; gap: 10px; }
        .urgent { background: #fff3cd; border: 2px dashed #fbc02d; color: #856404; }
        .terms { background: #f1f5f9; border: 1px solid #e2e8f0; color: #64748b; font-size: 11px; }

        button { width: 100%; padding: 18px; background: linear-gradient(to right, var(--brand-primary), var(--brand-secondary)); color: white; border: none; border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 15px; box-shadow: 0 10px 20px rgba(0, 98, 255, 0.2); }

        .whatsapp-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background-color: var(--whatsapp); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3); z-index: 1000; transition: 0.3s; }
        .whatsapp-btn:hover { transform: scale(1.1); }
        #status { text-align: center; margin-top: 20px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-box"><img src="logo.png" onerror="this.src='https://via.placeholder.com/180x60?text=iPromax+Group'"></div>
    <h2>iPromax Career Portal</h2>
    
    <form id="recruitmentForm">
        <div class="grid">
            <div class="full">
                <label>Position Applied For</label>
                <select name="postApplied" id="postApplied" onchange="updateFormDisplay()" required>
                    <option value="">-- Select Vacancy --</option>
                    <option value="Senior Technician">Senior Mobile Technician</option>
                    <option value="Laptop Technician">Laptop Technician</option>
                    <option value="Service Coordinator">Service Coordinator</option>
                    <option value="Accountant">Accountant</option>
                    <option value="Telecaller">Telecaller</option>
                    <option value="Front Desk Executive">Front Desk Executive</option>
                </select>
            </div>

            <div class="full" id="role-desc-container">
                <span class="role-title" id="role-title-text"></span>
                <span class="role-text" id="role-desc-text"></span>
            </div>

            <div class="full">
                <label>Technical Skills</label>
                <div class="skills-header">Select Your Expertise:</div>
                <div id="skills-container">
                    <p style="color:#94a3b8; font-size:12px; text-align:center; grid-column:span 2;">Choose a post...</p>
                </div>
            </div>

            <div class="full"><label>Full Name</label><input type="text" name="name" required></div>
            <div><label>Phone (WhatsApp)</label><input type="tel" name="phone" required></div>
            <div><label>Email Address</label><input type="email" name="email" required></div>
            
            <div class="full">
                <label>Preferred Office Location</label>
                <select name="officeLocation" required>
                    <option value="Kochi">Kochi Branch</option>
                    <option value="Trivandrum">Trivandrum (Kazhakkoottam) Branch</option>
                    <option value="Any / Relocate">Any Location / Relocate</option>
                </select>
            </div>

            <div><label>Experience (Yrs)</label><input type="number" name="experience" required></div>
            <div><label>Expected Salary (₹)</label><input type="number" name="salary" required></div>

            <div class="highlight-box urgent">
                <label class="option-item" style="color: inherit;">
                    <input type="checkbox" name="immediateJoin" value="Yes"> <strong>🚀 Ready for Immediate Joining</strong>
                </label>
            </div>

            <div class="full"><label>Upload Resume (PDF Only)</label><input type="file" id="cvFile" accept=".pdf" required></div>

            <div class="highlight-box terms">
                <label class="option-item" style="color: inherit;">
                    <input type="checkbox" id="consent" required> I agree to iPromax processing my data for recruitment purposes.
                </label>
            </div>
        </div>
        <button type="submit" id="submitBtn">Submit Application</button>
        <div id="status"></div>
    </form>
</div>

<a href="https://wa.me/910000000000?text=Hi%20iPromax,%20I%20have%20a%20question%20regarding%20the%20job%20opening." class="whatsapp-btn" target="_blank">
    <svg width="32" height="32" fill="white" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</a>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx9dS2dPzNOD5en0rvRyS6hdldTffZnf0-A2hiqfcw_TBQO7aaa3fb9Mb2ehK-mszqx/exec'; 

    const skillSets = {
        "Senior Technician": {
            skills: ["Micro-Soldering", "FaceID Repair", "CPU Reballing", "Display Glass Change", "iPhone Expert", "IC Repair"],
            desc: "Focus on chip-level motherboard repairs, micro-soldering, and complex device diagnostics."
        },
        "Laptop Technician": {
            skills: ["Motherboard Repair", "Display Change", "OS/Software", "MacBook Expert", "SSD Upgrade", "Chip Level"],
            desc: "Hardware troubleshooting, board-level soldering, and OS optimization for laptops."
        },
        "Service Coordinator": {
            skills: ["Job Tracking", "Customer Communication", "Scheduling", "Inventory", "Parts Status"],
            desc: "Managing repair workflows and ensuring clear communication between clients and technicians."
        },
        "Accountant": {
            skills: ["Tally / GST", "Billing", "Expense Tracking", "Daily Cash", "Excel Expert"],
            desc: "Handling showroom accounts, daily invoicing, and stock auditing."
        },
        "Telecaller": {
            skills: ["Malayalam Fluency", "English Fluency", "Sales Closing", "Customer Support", "CRM Management"],
            desc: "Engaging with customers over the phone for sales follow-ups and service support."
        },
        "Front Desk Executive": {
            skills: ["Greeting", "Basic Billing", "Phone Etiquette", "Showroom Upkeep", "Payment Collection"],
            desc: "First point of contact. Responsible for customer intake, billing, and front-office tasks."
        }
    };

    function updateFormDisplay() {
        const position = document.getElementById('postApplied').value;
        const container = document.getElementById('skills-container');
        const descBox = document.getElementById('role-desc-container');
        const descTitle = document.getElementById('role-title-text');
        const descText = document.getElementById('role-desc-text');
        
        container.innerHTML = '';
        if (skillSets[position]) {
            descBox.style.display = 'block';
            descTitle.innerText = position + " - Role Overview:";
            descText.innerText = skillSets[position].desc;
            skillSets[position].skills.forEach(skill => {
                container.innerHTML += `<label class="option-item"><input type="checkbox" name="skill" value="${skill}"> ${skill}</label>`;
            });
        } else {
            descBox.style.display = 'none';
            container.innerHTML = '<p style="color:#94a3b8; font-size:12px; text-align:center; grid-column:span 2;">Select a post...</p>';
        }
    }

    document.getElementById('recruitmentForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const skills = Array.from(document.querySelectorAll('input[name="skill"]:checked')).map(c => c.value).join(', ');
        if (!skills) { alert("Please select skills."); return; }
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        btn.disabled = true; btn.innerText = "Submitting...";
        status.style.display = "block"; status.innerText = "Uploading Application...";

        const file = document.getElementById('cvFile').files[0];
        const reader = new FileReader();
        reader.onload = function() {
            const fileData = { bytes: Array.from(new Uint8Array(reader.result)), mimeType: file.type, fileName: file.name };
            const params = new URLSearchParams(new FormData(document.getElementById('recruitmentForm')));
            params.set('specialization', skills);
            fetch(`${SCRIPT_URL}?${params.toString()}`, { method: 'POST', body: JSON.stringify(fileData) })
            .then(() => {
                status.innerText = "✨ Success! Application submitted to iPromax.";
                status.style.color = "green"; document.getElementById('recruitmentForm').reset();
                updateFormDisplay(); btn.disabled = false; btn.innerText = "Submit Application";
            }).catch(() => {
                status.innerText = "Error. Check internet."; status.style.color = "red"; btn.disabled = false;
            });
        };
        reader.readAsArrayBuffer(file);
    });
</script>
</body>
</html>
