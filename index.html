<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPromax Careers | Recruitment Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0062ff;
            --primary-dim: rgba(0, 98, 255, 0.1);
            --secondary: #00d2ff;
            --success: #00c853;
            --dark: #1e293b;
            --vacancy-tag: #e11d48;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --whatsapp: #25d366;
        }

        * { box-sizing: border-box; outline: none; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }

        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 680px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: fadeInCard 0.6s ease-out;
        }

        .logo-box { text-align: center; margin-bottom: 25px; }
        .logo-box img { max-width: 180px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }

        h2 {
            text-align: center; font-size: 26px; font-weight: 800; margin-bottom: 30px;
            background: linear-gradient(to right, #4f46e5, #06b6d4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
        .full { grid-column: span 2; }
        
        /* REQUIRED ASTERISK */
        label::after { content: " *"; color: var(--vacancy-tag); }

        label { font-weight: 700; font-size: 13px; color: var(--dark); margin-bottom: 6px; display: block; }

        input, select {
            width: 100%; padding: 13px 15px; border: 2px solid #e2e8f0;
            border-radius: 12px; font-size: 14px; transition: all 0.3s ease;
        }

        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-dim); }

        #role-desc-container {
            display: none; background: #f8fafc; border: 1px solid #e2e8f0;
            padding: 18px; border-radius: 12px; margin-bottom: 10px;
            animation: fadeInCard 0.4s ease-out;
        }
        .vacancy-badge {
            display: inline-block; background: var(--vacancy-tag); color: white;
            padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 800;
            margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .role-title { font-weight: 800; font-size: 14px; color: var(--dark); margin-bottom: 4px; display: block; }
        .role-text { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

        .skills-header { background: var(--dark); color: white; padding: 10px 15px; border-radius: 12px 12px 0 0; font-size: 12px; font-weight: 700; }
        #skills-container { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            background: white; border: 2px solid var(--dark); padding: 15px; border-radius: 0 0 12px 12px;
        }

        .option-item { display: flex; align-items: center; gap: 10px; font-size: 13px; cursor: pointer; color: var(--text-main); }
        .option-item input { width: 17px; height: 17px; accent-color: var(--primary); margin: 0; cursor: pointer; }

        .highlight-box { grid-column: span 2; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid transparent; }
        .urgent { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
        .terms { background: #f1f5f9; border: 1px solid #e2e8f0; color: var(--text-muted); font-size: 11px; }

        button {
            width: 100%; padding: 18px; background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white; border: none; border-radius: 14px; font-size: 17px; font-weight: 700;
            cursor: pointer; margin-top: 20px; box-shadow: 0 10px 20px rgba(0, 98, 255, 0.2); transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0, 98, 255, 0.3); }

        .whatsapp-btn {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            background-color: var(--whatsapp); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3); z-index: 1000;
        }
        #status { text-align: center; margin-top: 20px; font-weight: 700; display: none; padding: 10px; border-radius: 8px; }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .full, .grid > div { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-box"><img src="logo.png" onerror="this.src='https://via.placeholder.com/180x60?text=iPromax+Group'"></div>
    <h2>Join iPromax Team</h2>
    
    <form id="vibrantForm">
        <div class="grid">
            <div class="full">
                <label>Target Position</label>
                <select name="postApplied" id="postApplied" onchange="updateFormDisplay()" required>
                    <option value="">-- Select Vacancy --</option>
                    <option value="Senior Technician">Senior Mobile Technician</option>
                    <option value="Junior Technician">Junior Mobile Technician</option>
                    <option value="Laptop Technician">Laptop Technician</option>
                    <option value="Service Coordinator">Service Coordinator</option>
                    <option value="Accountant">Accountant</option>
                    <option value="Telecaller">Telecaller</option>
                    <option value="Front Desk Executive">Front Desk Executive</option>
                </select>
            </div>

            <div class="full" id="role-desc-container">
                <div class="vacancy-badge" id="vacancy-count"></div>
                <span class="role-title" id="role-title-text"></span>
                <span class="role-text" id="role-desc-text"></span>
            </div>

            <div class="full">
                <label>Expertise Check</label>
                <div class="skills-header">Select at least one Core Skill:</div>
                <div id="skills-container"><p style="font-size:12px; text-align:center; grid-column:span 2; margin:0; color:#94a3b8;">Choose a position above...</p></div>
            </div>

            <div class="full"><label>Full Name</label><input type="text" name="name" required placeholder="Full Name as per ID"></div>
            <div><label>WhatsApp Number</label><input type="tel" name="phone" required placeholder="91XXXXXXXX"></div>
            <div><label>Email</label><input type="email" name="email" required placeholder="email@domain.com"></div>
            
            <div class="full">
                <label>Branch Preference</label>
                <select name="officeLocation" required>
                    <option value="">-- Select Branch --</option>
                    <option value="Kochi">Kochi</option>
                    <option value="Trivandrum">Trivandrum</option>
                    <option value="Any / Relocate">Ready to Relocate</option>
                </select>
            </div>

            <div><label>Experience (Yrs)</label><input type="number" name="experience" required min="0"></div>
            <div><label>Exp. Salary (₹)</label><input type="number" name="salary" required min="1000"></div>

            <div class="highlight-box urgent">
                <label class="option-item" style="color: inherit;">
                    <input type="checkbox" name="immediateJoin" value="Yes" required> <strong>🚀 Confirmed Immediate Joiner</strong>
                </label>
            </div>

            <div class="full"><label>Resume (PDF)</label><input type="file" id="cvFile" accept=".pdf" required></div>

            <div class="highlight-box terms">
                <label class="option-item" style="color: inherit;">
                    <input type="checkbox" id="consent" required> I agree to Recruitment Terms & Data Processing.
                </label>
            </div>
        </div>
        <button type="submit" id="submitBtn">Send Application</button>
        <div id="status"></div>
    </form>
</div>

<a href="https://wa.me/919846802008?text=Hi%20iPromax,%20I'm%20applying%20for%20a%20vacancy." class="whatsapp-btn" target="_blank">
    <svg width="32" height="32" fill="white" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</a>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz3OhL7IH4PHCXFnfjkb0vb6DLgNUd38F9NkyEIzNPOXdHAViYSKUCDtZhW01dD4IMx/exec'; 

    const skillSets = {
        "Senior Technician": {
            skills: ["Micro-Soldering", "FaceID Repair", "CPU Reballing", "Display Glass Change", "iPhone Expert"],
            desc: "Expertise in high-end motherboard and chip-level diagnostics.",
            vacancies: 3
        },
        "Junior Technician": {
            skills: ["Screen Replacement", "Battery Change", "Charging Port Repair", "Basic Diagnostics", "Android/iOS Support"],
            desc: "Handling standard hardware repairs and component replacements for mobile devices.",
            vacancies: 4
        },
        "Laptop Technician": {
            skills: ["MacBook Motherboard", "Display Replacement", "OS Expert", "Chip Level Repair"],
            desc: "Hardware troubleshooting for Apple and premium laptop brands.",
            vacancies: 2
        },
        "Service Coordinator": {
            skills: ["CRM Management", "Customer Communication", "Inventory Tracking"],
            desc: "Managing technical workflow and client expectations.",
            vacancies: 1
        },
        "Accountant": {
            skills: ["Tally / GST", "Showroom Billing", "Expense Auditing"],
            desc: "Managing financial records and daily branch auditing.",
            vacancies: 1
        },
        "Telecaller": {
            skills: ["Malayalam Fluency", "English Fluency", "Sales Closing"],
            desc: "Customer service and service follow-ups via phone.",
            vacancies: 2
        },
        "Front Desk Executive": {
            skills: ["Greeting", "Basic Billing", "Admin Support"],
            desc: "Initial point of contact and showroom management.",
            vacancies: 2
        }
    };

    function updateFormDisplay() {
        const position = document.getElementById('postApplied').value;
        const container = document.getElementById('skills-container');
        const descBox = document.getElementById('role-desc-container');
        const descTitle = document.getElementById('role-title-text');
        const descText = document.getElementById('role-desc-text');
        const vTag = document.getElementById('vacancy-count');
        
        container.innerHTML = '';
        if (skillSets[position]) {
            descBox.style.display = 'block';
            vTag.innerText = skillSets[position].vacancies + " Vacancies Left";
            descTitle.innerText = position + " - Overview:";
            descText.innerText = skillSets[position].desc;
            skillSets[position].skills.forEach(skill => {
                container.innerHTML += `<label class="option-item"><input type="checkbox" name="skill" value="${skill}"> ${skill}</label>`;
            });
        } else {
            descBox.style.display = 'none';
            container.innerHTML = '<p style="font-size:12px; text-align:center; grid-column:span 2; margin:0; color:#94a3b8;">Choose a position above...</p>';
        }
    }

    document.getElementById('vibrantForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // STRICT SKILL VALIDATION
        const skills = Array.from(document.querySelectorAll('input[name="skill"]:checked')).map(c => c.value).join(', ');
        if (!skills) { 
            alert("⚠️ PROMPT: Please select at least one relevant skill for the position."); 
            return; 
        }
        
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        btn.disabled = true; btn.innerText = "Processing...";
        status.style.display = "block"; status.innerText = "Connecting to iPromax Recruitment Hub...";
        status.style.background = "#eff6ff"; status.style.color = "#1e40af";

        const file = document.getElementById('cvFile').files[0];
        const reader = new FileReader();
        reader.onload = function() {
            const fileData = { bytes: Array.from(new Uint8Array(reader.result)), mimeType: file.type, fileName: file.name };
            const params = new URLSearchParams(new FormData(document.getElementById('vibrantForm')));
            params.set('specialization', skills);
            
            fetch(`${SCRIPT_URL}?${params.toString()}`, { method: 'POST', body: JSON.stringify(fileData) })
            .then(() => {
                status.innerText = "✨ Application Successfully Received!";
                status.style.background = "#dcfce7"; status.style.color = "#166534";
                document.getElementById('vibrantForm').reset();
                updateFormDisplay(); btn.disabled = false; btn.innerText = "Send Application";
            }).catch(() => {
                status.innerText = "Connection Error. Please try again."; status.style.color = "red"; btn.disabled = false;
            });
        };
        reader.readAsArrayBuffer(file);
    });
</script>
</body>
</html>
