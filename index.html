<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPromax Careers | Recruitment Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0062ff; --primary-dim: rgba(0, 98, 255, 0.1);
            --secondary: #00d2ff; --success: #00c853;
            --dark: #1e293b; --vacancy-tag: #e11d48;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b; --text-muted: #64748b;
            --whatsapp: #25d366;
        }
        * { box-sizing: border-box; outline: none; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg-gradient);
            background-attachment: fixed; display: flex; justify-content: center;
            align-items: center; min-height: 100vh; margin: 0; padding: 20px;
        }
        .card {
            background: var(--glass-bg); border-radius: 24px; padding: 40px;
            width: 100%; max-width: 680px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .logo-box { text-align: center; margin-bottom: 25px; }
        .logo-box img { max-width: 180px; }
        h2 { text-align: center; font-weight: 800; margin-bottom: 30px; background: linear-gradient(to right, #4f46e5, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
        .full { grid-column: span 2; }
        label { font-weight: 700; font-size: 13px; color: var(--dark); margin-bottom: 6px; display: block; }
        label::after { content: " *"; color: var(--vacancy-tag); }
        input, select { width: 100%; padding: 13px 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 14px; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-dim); }
        #role-desc-container { display: none; background: #f8fafc; border: 1px solid #e2e8f0; padding: 18px; border-radius: 12px; margin-bottom: 10px; }
        .vacancy-badge { display: inline-block; background: var(--vacancy-tag); color: white; padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 800; margin-bottom: 10px; }
        .skills-header { background: var(--dark); color: white; padding: 10px 15px; border-radius: 12px 12px 0 0; font-size: 12px; font-weight: 700; }
        #skills-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: white; border: 2px solid var(--dark); padding: 15px; border-radius: 0 0 12px 12px; }
        .option-item { display: flex; align-items: center; gap: 10px; font-size: 13px; cursor: pointer; }
        .highlight-box { grid-column: span 2; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 12px; }
        .urgent { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
        button { width: 100%; padding: 18px; background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; border: none; border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 20px; box-shadow: 0 10px 20px rgba(0, 98, 255, 0.2); transition: 0.3s; }
        button:hover { transform: translateY(-2px); }
        #status { text-align: center; margin-top: 20px; font-weight: 700; display: none; padding: 12px; border-radius: 8px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .full { grid-column: span 1; } }
    </style>
</head>
<body>
<div class="card">
    <div class="logo-box"><img src="logo.png" onerror="this.src='https://via.placeholder.com/180x60?text=iPromax+Group'"></div>
    <h2>Join iPromax Team</h2>
    <form id="vibrantForm">
        <div class="grid">
            <div class="full">
                <label>Target Position</label>
                <select name="postApplied" id="postApplied" onchange="updateFormDisplay()" required>
                    <option value="">-- Select Vacancy --</option>
                    <option value="Senior Technician">Senior Mobile Technician</option>
                    <option value="Junior Technician">Junior Mobile Technician</option>
                    <option value="Laptop Technician">Laptop Technician</option>
                    <option value="Service Coordinator">Service Coordinator</option>
                    <option value="Accountant">Accountant</option>
                    <option value="Telecaller">Telecaller</option>
                    <option value="Front Desk Executive">Front Desk Executive</option>
                </select>
            </div>
            <div class="full" id="role-desc-container">
                <div class="vacancy-badge" id="vacancy-count"></div>
                <span id="role-title-text" style="display:block; font-weight:800; font-size:14px;"></span>
                <span id="role-desc-text" style="font-size:13px; color:var(--text-muted);"></span>
            </div>
            <div class="full">
                <label>Expertise Check</label>
                <div class="skills-header">Select Core Skills:</div>
                <div id="skills-container"><p style="font-size:12px; text-align:center; grid-column:span 2; color:#94a3b8;">Choose a position above...</p></div>
            </div>
            <div class="full"><label>Full Name</label><input type="text" name="name" required></div>
            <div><label>WhatsApp Number</label><input type="tel" name="phone" required></div>
            <div><label>Email</label><input type="email" name="email" required></div>
            <div class="full"><label>Branch Preference</label>
                <select name="officeLocation" required>
                    <option value="">-- Select --</option>
                    <option value="Kochi">Kochi</option>
                    <option value="Trivandrum">Trivandrum</option>
                    <option value="Any">Ready to Relocate</option>
                </select>
            </div>
            <div><label>Experience (Yrs)</label><input type="number" name="experience" required></div>
            <div><label>Exp. Salary (₹)</label><input type="number" name="salary" required></div>
            <div class="highlight-box urgent"><label class="option-item"><input type="checkbox" name="immediateJoin" value="Yes" required> 🚀 Immediate Joiner</label></div>
            <div class="full"><label>Resume (PDF)</label><input type="file" id="cvFile" accept=".pdf" required></div>
        </div>
        <button type="submit" id="submitBtn">Send Application</button>
        <div id="status"></div>
    </form>
</div>

<script>
    // ⚠️ REPLACE THIS WITH YOUR NEW DEPLOYMENT URL
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxutIyR6yOVjaxocm9ZmejGZ0H_46r80FZiF345L0cKYy96J7U3b7uO7aRW4TeiKr7Q/exec'; 

    const skillSets = {
        "Senior Technician": { skills: ["Micro-Soldering", "FaceID Repair", "CPU Reballing", "iPhone Expert"], desc: "Logic board specialist.", vacancies: 3 },
        "Junior Technician": { skills: ["Screen Replacement", "Battery Change", "Basic Diagnostics"], desc: "Standard hardware repairs.", vacancies: 4 },
        "Laptop Technician": { skills: ["MacBook Motherboard", "Chip Level Repair", "OS Expert"], desc: "Premium laptop hardware.", vacancies: 2 },
        "Service Coordinator": { skills: ["CRM", "Customer Care", "Inventory"], desc: "Workflow management.", vacancies: 1 },
        "Accountant": { skills: ["Tally/GST", "Billing", "Auditing"], desc: "Financial management.", vacancies: 1 },
        "Telecaller": { skills: ["Malayalam/English", "Sales", "Support"], desc: "Phone support.", vacancies: 2 },
        "Front Desk Executive": { skills: ["Greeting", "Billing", "Admin"], desc: "Showroom management.", vacancies: 2 }
    };

    function updateFormDisplay() {
        const pos = document.getElementById('postApplied').value;
        const cont = document.getElementById('skills-container');
        const descB = document.getElementById('role-desc-container');
        cont.innerHTML = '';
        if (skillSets[pos]) {
            descB.style.display = 'block';
            document.getElementById('vacancy-count').innerText = skillSets[pos].vacancies + " Vacancies Left";
            document.getElementById('role-title-text').innerText = pos;
            document.getElementById('role-desc-text').innerText = skillSets[pos].desc;
            skillSets[pos].skills.forEach(s => {
                cont.innerHTML += `<label class="option-item"><input type="checkbox" name="skill" value="${s}"> ${s}</label>`;
            });
        } else { descB.style.display = 'none'; cont.innerHTML = '<p>Choose a position...</p>'; }
    }

    document.getElementById('vibrantForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const skills = Array.from(document.querySelectorAll('input[name="skill"]:checked')).map(c => c.value).join(', ');
        if (!skills) { alert("Please select skills."); return; }
        
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        btn.disabled = true; btn.innerText = "Sending...";
        status.style.display = "block"; status.innerText = "Submitting to iPromax Hub...";
        status.style.background = "#eff6ff";

        const file = document.getElementById('cvFile').files[0];
        const reader = new FileReader();
        reader.onload = function() {
            const fileData = { bytes: Array.from(new Uint8Array(reader.result)), mimeType: file.type, fileName: file.name };
            const params = new URLSearchParams(new FormData(document.getElementById('vibrantForm')));
            params.set('specialization', skills);

            fetch(`${SCRIPT_URL}?${params.toString()}`, {
                method: 'POST',
                mode: 'no-cors', // <--- BYPASSES CORS ERROR
                body: JSON.stringify(fileData)
            })
            .then(() => {
                status.innerText = "✨ Application Successfully Received!";
                status.style.background = "#dcfce7"; status.style.color = "#166534";
                document.getElementById('vibrantForm').reset();
                updateFormDisplay(); btn.disabled = false; btn.innerText = "Send Application";
            })
            .catch(() => {
                status.innerText = "Submission finished. Check sheet.";
                btn.disabled = false;
            });
        };
        reader.readAsArrayBuffer(file);
    });
</script>
</body>
</html>
